<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 16px;
      box-sizing: border-box;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .card-header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .card-header h1 {
      margin: 0;
      font-size: 1.35rem;
    }
    .card-header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #555;
    }
    .session-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      font-family: ui-monospace, monospace;
      word-break: break-all;
    }
    .messages {
      flex: 1;
      min-height: 280px;
      max-height: min(60vh, 520px);
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.45;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message .message-text {
      white-space: pre-wrap;
    }
    .message .timestamp {
      font-size: 11px;
      line-height: 1.2;
      opacity: 0.8;
      align-self: flex-end;
    }
    .user-message {
      align-self: flex-end;
      background: #635bff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .user-message .timestamp {
      color: rgba(255, 255, 255, 0.85);
    }
    .bot-message {
      align-self: flex-start;
      background: #eef0ff;
      color: #222;
      border-bottom-left-radius: 4px;
    }
    .bot-message .timestamp {
      color: #555;
    }
    .human-message {
      align-self: flex-start;
      background: #e8f5e9;
      color: #1b5e20;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #2e7d32;
    }
    .human-message .human-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2e7d32;
      margin-bottom: 4px;
    }
    .human-message .timestamp {
      color: #558b2f;
    }
    .ixchat-choice-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .ixchat-choice-btn {
      border: 1px solid #635bff;
      background: #fff;
      color: #635bff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      line-height: 1.3;
      cursor: pointer;
      font-family: inherit;
    }
    .ixchat-choice-btn:hover:not(:disabled) {
      background: #eef0ff;
    }
    .ixchat-choice-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }
    .composer {
      display: flex;
      gap: 10px;
      padding: 16px 20px 20px;
      border-top: 1px solid #e5e5e5;
      align-items: flex-end;
    }
    .composer textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      font-family: inherit;
      font-size: 15px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .composer textarea:focus {
      outline: none;
      border-color: #635bff;
      box-shadow: 0 0 0 2px rgba(99, 91, 255, 0.2);
    }
    button.send {
      border: 0;
      border-radius: 8px;
      padding: 12px 20px;
      background: #635bff;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    button.send:hover {
      background: #5148e7;
    }
    button.send:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .back {
      margin-bottom: 12px;
    }
    .back a {
      color: #635bff;
      text-decoration: none;
      font-size: 14px;
    }
    .back a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="back">
      <a href="/">← Retour</a>
    </nav>
    <main class="card">
      <div class="card-header">
        <h1>Chat</h1>
        <p>Assistant tableau d’encre : messages envoyés au serveur. Session conservée entre les visites.</p>
        <p id="session-hint" class="session-hint" aria-live="polite"></p>
        <p><button type="button" id="btn-new-session" style="margin-top:8px;font-size:13px;">Nouvelle session</button></p>
      </div>
      <div id="messages" class="messages" role="log" aria-live="polite" aria-relevant="additions"></div>
      <form id="form-chat" class="composer" autocomplete="off">
        <label for="input" class="visually-hidden">Message</label>
        <textarea id="input" name="message" rows="1" placeholder="Votre message…" maxlength="8000"></textarea>
        <button type="submit" class="send" id="btn-send">Envoyer</button>
      </form>
    </main>
  </div>
  <style>
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
  <script src="/static/agent.js"></script>
  <script>
    (function () {
      var ui = window.ChatAgentUI;
      var box = document.getElementById("messages");
      var form = document.getElementById("form-chat");
      var input = document.getElementById("input");
      var btn = document.getElementById("btn-send");
      var sessionHint = document.getElementById("session-hint");

      var FETCH_MS = 28000;
      var POLL_MS = 5000;
      var API_URL = "/agent/prompt";
      var MAX_HISTORY_MESSAGES = 20;
      /** Nombre de messages côté serveur déjà reflétés dans l’UI (transcription JSON). */
      var serverSyncedCount = 0;
      /** True pendant qu’un fetch POST est en cours — bloque le poll pour éviter le doublon. */
      var fetchInFlight = false;
      /** Tant que true, le bulle d’accueil est affichée (retirée au 1er envoi ou au 1er poll avec historique). */
      var welcomeActive = true;
      /** @type {{role:string, content:string}[]} */
      var conversationHistory = [];
      var activeChoiceMessageEl = null;

      function generateSessionId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return "s" + Date.now().toString(36) + Math.random().toString(36).slice(2, 14);
      }

      var sessionId = localStorage.getItem("sessionId");
      if (!sessionId) {
        sessionId = generateSessionId();
        localStorage.setItem("sessionId", sessionId);
      }
      if (sessionHint) {
        sessionHint.textContent = "Session : " + sessionId;
      }

      function formatTime(ts) {
        var d = ts != null ? new Date(ts) : new Date();
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      /**
       * @param {string} text
       * @param {boolean} isUser
       * @param {number} timestamp
       * @param {{ human?: boolean, prenom?: string, buttons?: Array, interactiveButtons?: boolean, onButtonSelect?: function }} [opts]
       */
      function disableActiveChoiceButtons() {
        if (activeChoiceMessageEl && ui && ui.disableChoiceButtons) {
          ui.disableChoiceButtons(activeChoiceMessageEl);
        }
        activeChoiceMessageEl = null;
      }

      function addMessage(text, isUser, timestamp, opts) {
        opts = opts || {};
        var messageDiv = document.createElement("div");
        if (isUser) {
          messageDiv.className = "message user-message";
        } else if (opts.human) {
          messageDiv.className = "message human-message";
          var badge = document.createElement("span");
          badge.className = "human-badge";
          var pn = opts.prenom && String(opts.prenom).trim();
          badge.textContent = pn ? "Humain — " + pn : "Humain";
          messageDiv.appendChild(badge);
        } else {
          messageDiv.className = "message bot-message";
        }

        var textSpan = document.createElement("span");
        textSpan.className = "message-text";
        textSpan.textContent = text;
        messageDiv.appendChild(textSpan);

        var buttons = ui ? ui.normalizeButtons(opts.buttons) : [];
        if (!isUser && buttons.length && ui) {
          var interactive = opts.interactiveButtons !== false;
          ui.appendChoiceButtons(messageDiv, buttons, {
            interactive: interactive,
            onSelect: interactive ? opts.onButtonSelect : undefined,
          });
          if (interactive) {
            disableActiveChoiceButtons();
            activeChoiceMessageEl = messageDiv;
          }
        }

        if (timestamp != null) {
          var timeSpan = document.createElement("span");
          timeSpan.className = "timestamp";
          timeSpan.textContent = formatTime(timestamp);
          messageDiv.appendChild(timeSpan);
        }

        box.appendChild(messageDiv);
        box.scrollTop = box.scrollHeight;
      }

      function tsFromServerMsg(m) {
        if (m && m.at) {
          var x = Date.parse(m.at);
          if (!isNaN(x)) return x;
        }
        return Date.now();
      }

      function conversationTurnsFromServer(messages) {
        var out = [];
        for (var i = 0; i < messages.length; i++) {
          var m = messages[i];
          if (!m || typeof m.role !== "string") continue;
          var role = m.role.toLowerCase();
          var content = m.content != null ? String(m.content) : "";
          if (role === "user") out.push({ role: "user", content: content });
          else if (role === "assistant") {
            var turn = { role: "assistant", content: content };
            if (m.from_human === true) {
              turn.from_human = true;
              if (m.prenom != null && String(m.prenom).trim()) {
                turn.prenom = String(m.prenom).trim();
              }
            }
            out.push(turn);
          }
        }
        return out.slice(-MAX_HISTORY_MESSAGES);
      }

      function renderOneServerMessage(m, msgIndex, allMessages) {
        if (!m || typeof m.role !== "string") return;
        var role = m.role.toLowerCase();
        var text = m.content != null ? String(m.content) : "";
        var ts = tsFromServerMsg(m);
        if (role === "user") {
          addMessage(text, true, ts);
          return;
        }
        if (role !== "assistant") return;
        var fromHuman = m.from_human === true;
        var pn =
          m.prenom != null && String(m.prenom).trim() ? String(m.prenom).trim() : "";
        var buttons = m.buttons;
        var interactiveButtons =
          Array.isArray(buttons) &&
          buttons.length > 0 &&
          msgIndex === allMessages.length - 1;
        addMessage(text, false, ts, {
          human: fromHuman,
          prenom: pn,
          buttons: buttons,
          interactiveButtons: interactiveButtons,
          onButtonSelect: interactiveButtons
            ? function (value, label) {
                sendUserTurn(value, label);
              }
            : undefined,
        });
      }

      function pollUrl() {
        return API_URL + "?sessionId=" + encodeURIComponent(sessionId);
      }

      function pollOnce() {
        fetch(pollUrl(), { credentials: "same-origin" })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (!data || !Array.isArray(data.messages)) return;
            var msgs = data.messages;
            if (msgs.length === 0) return;
            if (serverSyncedCount === 0 && msgs.length > 0) {
              box.innerHTML = "";
              welcomeActive = false;
              activeChoiceMessageEl = null;
              for (var j = 0; j < msgs.length; j++) {
                renderOneServerMessage(msgs[j], j, msgs);
              }
              serverSyncedCount = msgs.length;
              conversationHistory = conversationTurnsFromServer(msgs);
              return;
            }
            if (fetchInFlight) return;
            if (msgs.length > serverSyncedCount) {
              for (var k = serverSyncedCount; k < msgs.length; k++) {
                renderOneServerMessage(msgs[k], k, msgs);
              }
              serverSyncedCount = msgs.length;
              conversationHistory = conversationTurnsFromServer(msgs);
            }
          })
          .catch(function () {});
      }

      addMessage(
        "Bonjour. Posez votre question sur le tableau d’encre électronique (support, achat, SAV).",
        false,
        Date.now()
      );

      setInterval(pollOnce, POLL_MS);
      pollOnce();

      function detailFromJson(data) {
        if (!data || data.detail === undefined || data.detail === null) return "";
        var d = data.detail;
        if (typeof d === "string") return d;
        if (Array.isArray(d) && d[0] && d[0].msg) {
          return d
            .map(function (x) {
              return x.msg;
            })
            .join(" ");
        }
        try {
          return JSON.stringify(d);
        } catch (err) {
          return String(d);
        }
      }

      function handleAgentResponse(data, userPrompt, userDisplay) {
        var reply = data && data.reply != null ? String(data.reply) : "";
        var humanLocked = data && data.human_in_charge === true;
        var hasAssistantReply = !humanLocked && reply.trim() !== "";
        if (hasAssistantReply) {
          addMessage(reply, false, Date.now(), {
            buttons: data && data.buttons,
            interactiveButtons: true,
            onButtonSelect: function (value, label) {
              sendUserTurn(value, label);
            },
          });
        }
        serverSyncedCount += hasAssistantReply ? 2 : 1;
        conversationHistory.push({ role: "user", content: userPrompt });
        if (hasAssistantReply) {
          conversationHistory.push({ role: "assistant", content: reply });
        }
        if (conversationHistory.length > MAX_HISTORY_MESSAGES) {
          conversationHistory = conversationHistory.slice(-MAX_HISTORY_MESSAGES);
        }
        if (
          data &&
          (data.handoff_signal || (data.ticket && typeof data.ticket === "object"))
        ) {
          var note = "Transmission au support indiquée.";
          if (data.handoff_signal === "human_requires_human") {
            note = "Vous avez demandé un interlocuteur humain — transmission au support.";
          } else if (data.handoff_signal === "agent_demande_humain") {
            note = "L’assistant propose un passage au support.";
          }
          addMessage(note, false, Date.now());
        }
      }

      function sendUserTurn(promptValue, displayLabel) {
        var prompt = (promptValue || "").trim();
        if (!prompt || fetchInFlight) return;
        var shown =
          displayLabel != null && String(displayLabel).trim()
            ? String(displayLabel).trim()
            : prompt;

        if (welcomeActive) {
          welcomeActive = false;
          box.innerHTML = "";
          activeChoiceMessageEl = null;
        }

        disableActiveChoiceButtons();
        addMessage(shown, true, Date.now());
        input.value = "";
        btn.disabled = true;

        var controller = new AbortController();
        var timeoutId = setTimeout(function () {
          controller.abort();
        }, FETCH_MS);

        var prior = conversationHistory.slice(-MAX_HISTORY_MESSAGES);
        fetchInFlight = true;
        var req = fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: prompt,
            sessionId: sessionId,
            messages: prior,
          }),
          signal: controller.signal,
        });
        req.finally(function () {
          clearTimeout(timeoutId);
        });
        req
          .then(function (r) {
            return r.json().then(function (data) {
              if (!r.ok) {
                var msg = detailFromJson(data) || "Erreur " + r.status;
                throw new Error(msg);
              }
              return data;
            });
          })
          .then(function (data) {
            handleAgentResponse(data, prompt, shown);
          })
          .catch(function (err) {
            var msg;
            if (err && err.name === "AbortError") {
              msg = "Délai dépassé (" + FETCH_MS / 1000 + " s). Réessayez plus tard.";
            } else {
              msg = err && err.message ? err.message : String(err);
            }
            addMessage("Erreur : " + msg, false, Date.now());
          })
          .finally(function () {
            fetchInFlight = false;
            btn.disabled = false;
            input.focus();
          });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var t = (input.value || "").trim();
        if (!t) return;
        sendUserTurn(t, t);
      });

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      function resetSession() {
        var closingId = sessionId;
        fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: "Closed session",
            sessionId: closingId,
            messages: [],
          }),
          credentials: "same-origin",
          keepalive: true,
        })
          .catch(function () {})
          .finally(function () {
            sessionId = generateSessionId();
            localStorage.setItem("sessionId", sessionId);
            if (sessionHint) sessionHint.textContent = "Session : " + sessionId;
            serverSyncedCount = 0;
            welcomeActive = true;
            conversationHistory = [];
            activeChoiceMessageEl = null;
            box.innerHTML = "";
            addMessage(WELCOME_TEXT, false, Date.now());
            pollOnce();
          });
      }

      var newSessionBtn = document.getElementById("btn-new-session");
      if (newSessionBtn) newSessionBtn.addEventListener("click", resetSession);
    })();
  </script>
</body>
</html>
